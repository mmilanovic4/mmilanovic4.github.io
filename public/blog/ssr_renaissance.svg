<svg width="680" height="210" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg" role="img" font-family="sans-serif">
  <title>Era 4: The SSR renaissance</title>
  <desc>Server renders HTML with components and sends it to the browser. JS hydrates only where needed.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="680" height="210" fill="#fff"/>

  <!-- Database -->
  <rect x="60" y="65" width="100" height="56" rx="4" fill="none" stroke="#111" stroke-width="1"/>
  <text x="110" y="89" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Database</text>
  <text x="110" y="109" text-anchor="middle" font-size="12" fill="#444">or CMS</text>

  <!-- Arrow DB → Server -->
  <line x1="160" y1="93" x2="200" y2="93" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Server box -->
  <rect x="200" y="45" width="175" height="96" rx="4" fill="none" stroke="#111" stroke-width="1"/>
  <text x="287" y="71" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Server (Next.js etc.)</text>
  <text x="287" y="91" text-anchor="middle" font-size="12" fill="#444">Renders components</text>
  <text x="287" y="109" text-anchor="middle" font-size="12" fill="#444">server-side → full HTML</text>
  <text x="287" y="127" text-anchor="middle" font-size="12" fill="#444">(streaming or static)</text>

  <!-- Arrow Server → Browser (HTML) -->
  <line x1="375" y1="75" x2="435" y2="75" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="405" y="65" text-anchor="middle" font-size="11" fill="#555">Full HTML</text>

  <!-- Arrow JS hydration back (dashed) with more vertical room -->
  <path d="M435 115 L405 115 L405 148 L375 148" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="405" y="168" text-anchor="middle" font-size="11" fill="#555">JS only where needed</text>

  <!-- Browser box -->
  <rect x="435" y="45" width="185" height="96" rx="4" fill="none" stroke="#111" stroke-width="1"/>
  <text x="527" y="71" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Browser</text>
  <text x="527" y="91" text-anchor="middle" font-size="12" fill="#444">Displays HTML immediately</text>
  <text x="527" y="109" text-anchor="middle" font-size="12" fill="#444">JS hydrates interactive</text>
  <text x="527" y="127" text-anchor="middle" font-size="12" fill="#444">parts only</text>

</svg>
