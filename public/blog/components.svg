<svg width="680" height="190" viewBox="0 0 680 190" xmlns="http://www.w3.org/2000/svg" role="img" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="680" height="190" fill="#fff"/>

  <!-- CDN / Server -->
  <rect x="30" y="55" width="130" height="60" rx="4" fill="none" stroke="#111" stroke-width="1"/>
  <text x="95" y="81" text-anchor="middle" font-size="14" font-weight="600" fill="#111">CDN / Server</text>
  <text x="95" y="101" text-anchor="middle" font-size="12" fill="#444">HTML + JS bundle</text>

  <!-- Arrow to browser -->
  <line x1="160" y1="85" x2="200" y2="85" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Browser box -->
  <rect x="200" y="35" width="290" height="110" rx="4" fill="none" stroke="#111" stroke-width="1"/>
  <text x="345" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Browser</text>

  <!-- Component tree inside browser -->
  <rect x="216" y="68" width="258" height="64" rx="4" fill="none" stroke="#111" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="345" y="86" text-anchor="middle" font-size="11" fill="#555">JS renders component tree</text>
  <!-- Small components -->
  <rect x="226" y="96" width="62" height="24" rx="3" fill="none" stroke="#111" stroke-width="0.8"/>
  <text x="257" y="112" text-anchor="middle" font-size="11" fill="#111">&lt;Header/&gt;</text>
  <rect x="300" y="96" width="56" height="24" rx="3" fill="none" stroke="#111" stroke-width="0.8"/>
  <text x="328" y="112" text-anchor="middle" font-size="11" fill="#111">&lt;Feed/&gt;</text>
  <rect x="368" y="96" width="62" height="24" rx="3" fill="none" stroke="#111" stroke-width="0.8"/>
  <text x="399" y="112" text-anchor="middle" font-size="11" fill="#111">&lt;Sidebar/&gt;</text>

  <!-- API arrows -->
  <line x1="490" y1="75" x2="540" y2="75" stroke="#111" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="540" y1="95" x2="490" y2="95" stroke="#111" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="515" y="65" text-anchor="middle" font-size="11" fill="#555">API</text>

  <!-- API box -->
  <rect x="540" y="55" width="100" height="60" rx="4" fill="none" stroke="#111" stroke-width="1"/>
  <text x="590" y="81" text-anchor="middle" font-size="14" font-weight="600" fill="#111">API</text>
  <text x="590" y="101" text-anchor="middle" font-size="12" fill="#444">data only</text>
</svg>
