name: 🚀 Build and Deploy (Next.js)

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies 📦
        run: npm install

      - name: Build static site 🔧
        env:
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_THEME: ${{ vars.NEXT_PUBLIC_THEME }}
        run: npm run build

      - name: Add .nojekyll 🩹
        run: echo "" > out/.nojekyll

      - name: Setup Pages 📄
        uses: actions/configure-pages@v5

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
