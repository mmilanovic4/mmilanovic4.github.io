# Sample workflow for building and deploying a Next.js site to GitHub Pages
name: Deploy Next.js site to Pages 🚀

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      # Install Node.js 24 on the runner
      - name: Setup Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Install project dependencies
      - name: Install dependencies 📦
        run: npm install

      # Build the Next.js static export, injecting environment variables
      - name: Build static site 🔧
        env:
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_THEME: ${{ vars.NEXT_PUBLIC_THEME }}
        run: npm run build

      # GitHub Pages ignores directories prefixed with underscore (e.g. _next)
      # .nojekyll disables Jekyll processing and allows them to be served correctly
      - name: Add .nojekyll 🩹
        run: echo "" > out/.nojekyll

      # Configure GitHub Pages for deployment
      - name: Setup Pages 📄
        uses: actions/configure-pages@v6

      # Upload the static output as a Pages artifact
      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

      # Deploy the artifact to GitHub Pages
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v5
